<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SmartANDJ Predictor (Prototype)</title>
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 24px; max-width: 900px }
      h1 { margin-bottom: 8px }
      .card { border: 1px solid #e5e7eb; padding: 16px; border-radius: 8px; margin: 12px 0 }
      label { display:block; font-weight:600; margin: 8px 0 4px }
      input { width: 100%; padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px }
      button { margin-top: 8px; padding: 10px 14px; border-radius: 6px; background:#111827; color:#fff; border: none; cursor: pointer }
      pre { background: #0b1021; color: #d1fae5; padding: 12px; border-radius: 6px; overflow-x: auto }
      .row { display:grid; grid-template-columns: 1fr 1fr; gap: 12px }
    </style>
  </head>
  <body>
    <h1>SmartANDJ Predictor – Prototype</h1>
    <p>API de démonstration. Remplissez les champs et cliquez sur Prédire.</p>

    <div class="card">
      <h2>Prédiction Football</h2>
      <div class="row">
        <div>
          <label>Équipe domicile</label>
          <input id="f-home" placeholder="ex: PSG" />
        </div>
        <div>
          <label>Équipe extérieur</label>
          <input id="f-away" placeholder="ex: OM" />
        </div>
      </div>
      <label>Date (YYYY-MM-DD)</label>
      <input id="f-date" placeholder="2025-11-01" />
      <button onclick="predictFootball()">Prédire</button>
      <pre id="f-out"></pre>
    </div>

    <div class="card">
      <h2>Prédiction Basketball</h2>
      <div class="row">
        <div>
          <label>Équipe domicile</label>
          <input id="b-home" placeholder="ex: Lakers" />
        </div>
        <div>
          <label>Équipe extérieur</label>
          <input id="b-away" placeholder="ex: Warriors" />
        </div>
      </div>
      <label>Date (YYYY-MM-DD)</label>
      <input id="b-date" placeholder="2025-11-01" />
      <button onclick="predictBasket()">Prédire</button>
      <pre id="b-out"></pre>
    </div>

    <script>
      async function predictFootball() {
        const body = {
          home_team: document.getElementById('f-home').value,
          away_team: document.getElementById('f-away').value,
          match_date: document.getElementById('f-date').value || null,
        };
        const res = await fetch('/predict/football', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
        document.getElementById('f-out').textContent = JSON.stringify(await res.json(), null, 2);
      }
      async function predictBasket() {
        const body = {
          home_team: document.getElementById('b-home').value,
          away_team: document.getElementById('b-away').value,
          match_date: document.getElementById('b-date').value || null,
        };
        const res = await fetch('/predict/basketball', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
        document.getElementById('b-out').textContent = JSON.stringify(await res.json(), null, 2);
      }
    </script>
  </body>
  </html>
